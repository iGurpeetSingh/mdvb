<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Login Page</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 { text-align: center; color: #333; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: #666; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #007bff; }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #message {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            min-height: 20px;
        }
        .error { color: #d9534f; }
        .success { color: #5cb85c; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Welcome Back</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email / Username</label>
            <input type="text" id="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" required>
        </div>
        <button type="submit" id="submitBtn">Login</button>
    </form>
    <div id="message"></div>
</div>

<script>
$(document).ready(function() {
    $('#loginForm').on('submit', function(e) {
        e.preventDefault(); // Page refresh hone se rokta hai

        // Inputs capture karna
        const email = $('#email').val().trim();
        const password = $('#password').val().trim();
        const $msg = $('#message');
        const $btn = $('#submitBtn');

        // Initial validation check
        if(email === "" || password === "") {
            $msg.html('<span class="error">Please fill all fields!</span>');
            return;
        }

        // Button state change
        $btn.prop('disabled', true).text('Checking...');
        $msg.html('');

        // Mock AJAX Call (Demo ke liye)
        // Real project mein yahan $.ajax() use karein
        setTimeout(function() {
            if(email === "admin@example.com" && password === "12345") {
                $msg.html('<span class="success">Login Successful! Redirecting...</span>');
                // Success hone par dashboard par bhejne ke liye:
                // window.location.href = "dashboard.html";
            } else {
                $msg.html('<span class="error">Invalid email or password. Try again!</span>');
                $btn.prop('disabled', false).text('Login');
            }
        }, 1500); // 1.5 seconds ka fake delay taaki loading effect dikhe
    });
});
</script>

</body>
</html>
