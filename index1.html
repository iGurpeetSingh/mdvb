<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Redirect</title>
    
    <!-- jQuery Library -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
            width: 350px;
        }
        h2 { text-align: center; color: #333; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; /* padding fix */
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover { background-color: #218838; }
        #msg {
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
        }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login Form</h2>
    <form id="loginForm">
        <input type="email" id="userEmail" placeholder="Email (admin@gmail.com)" required>
        <input type="password" id="userPass" placeholder="Password (12345)" required>
        <button type="submit" id="loginBtn">Login</button>
    </form>
    <div id="msg"></div>
</div>

<script>
$(document).ready(function() {
    $('#loginForm').on('submit', function(e) {
        e.preventDefault(); // Page reload hone se rokne ke liye

        // User input values lena
        let email = $('#userEmail').val();
        let pass = $('#userPass').val();
        let messageElement = $('#msg');

        // Logic check
        if (email === "admin@gmail.com" && pass === "12345") {
            
            messageElement.html('<span class="success">Sahi hai! Redirecting...</span>');
            
            // 1 second baad home page par bhej dega
            setTimeout(function() {
                window.location.href = "home.html"; 
            }, 1000);

        } else {
            messageElement.html('<span class="error">Galat Email ya Password!</span>');
        }
    });
});
</script>

</body>
</html>
